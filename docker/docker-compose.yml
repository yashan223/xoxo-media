services:

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "${JELLYFIN_PORT}:8096"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ${MEDIA_DIR}:/media
    devices:
      - /dev/dri:/dev/dri
    networks:
      - media-net

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    ports:
      - "${QBIT_PORT}:8080"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - qbit-config:/config
      - ${MEDIA_DIR}/downloads:/downloads
    networks:
      - media-net

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    ports:
      - "${FILEBROWSER_PORT}:80"
    volumes:
      - ${MEDIA_DIR}/downloads:/srv
      - filebrowser-db:/database
      - filebrowser-config:/config
    command: --port 80 --database /database/filebrowser.db
    networks:
      - media-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-confd:/etc/nginx/conf.d:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - jellyfin
      - qbittorrent
      - filebrowser
    networks:
      - media-net

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --standalone --quiet;
        sleep 12h & wait $${!};
      done"
    networks:
      - media-net

networks:
  media-net:
    driver: bridge

volumes:
  jellyfin-config:
  jellyfin-cache:
  qbit-config:
  filebrowser-db:
  filebrowser-config:
  certbot-certs:
